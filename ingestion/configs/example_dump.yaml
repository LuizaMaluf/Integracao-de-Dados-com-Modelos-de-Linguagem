source_name: gold_financiamentos
type: dump
schedule: "@weekly"

# Supported formats: sql | csv_gz
format: csv_gz
file_path: /opt/airflow/raw_files/gold_financiamentos.csv.gz

# For format: sql — list which tables to extract (leave empty = all)
# For format: csv_gz — ignored (single table per file)
tables:
  - gold_financiamentos_imobiliarios

encoding: utf-8
separator: ","

# dbt package this source feeds — used by transformation_dag_factory to group DAGs
dbt_packages:
  - name: gold
    select: models/silver/

# Airflow Dataset URI produced after silver write — triggers transform_gold DAG
silver_dataset: "silver://gold_financiamentos"
