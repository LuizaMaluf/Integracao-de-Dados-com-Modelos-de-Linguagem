source_name: siafi_empenhos
type: api
schedule: "@daily"

url: "https://api.portaldatransparencia.gov.br/api-de-dados/despesas/por-orgao"

# HTTP auth strategy: none | bearer | api_key_header
auth_strategy: api_key_header
auth_header: chave-api
# Value loaded from env var at runtime
auth_env_var: SIAFI_API_KEY

# Pagination strategy: none | cursor | page_number | offset
pagination_strategy: page_number
page_param: pagina
page_size: 500
page_size_param: quantidade

# Static query params appended to every request
params:
  ano: 2024
  orgao: "26000"

# JSON path to the records list in each page response (dot-notation)
records_path: data

# Stop pagination when this field in the response is false/null
has_more_field: hasNext
