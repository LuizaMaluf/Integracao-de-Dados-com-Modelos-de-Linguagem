source_name: orcamento_narrativo
type: pdf
schedule: "@monthly"
extraction_mode: semantic

source_url: "https://example.gov.br/relatorios/orcamento_narrativo.pdf"
# file_path: /opt/airflow/raw_files/orcamento_narrativo.pdf

# Pages to consider: all | first | last | list of 1-based page numbers
pages: all

# Prompt sent to the LLM together with each page's narrative text blocks.
# Be specific about desired columns — the LLM returns a JSON array of objects.
semantic_prompt: >
  Read the text below extracted from a Brazilian federal budget report.
  Extract every budget line item mentioned and return a JSON array where
  each object has exactly these keys:
  programa (string), acao (string), vl_dotacao (number),
  vl_empenhado (number), exercicio (integer).
  Return only the JSON array, no explanation.
