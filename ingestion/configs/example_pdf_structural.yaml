source_name: siafi_relatorio_mensal
type: pdf
schedule: "@monthly"
extraction_mode: structural

# URL or local path to the PDF
source_url: "https://example.gov.br/relatorios/siafi_mensal.pdf"
# file_path: /opt/airflow/raw_files/siafi_mensal.pdf  # alternative: local file

# Find pages whose text contains this string and extract tables from them
page_selector:
  contains_text: "Execução Orçamentária"

# How many tables to extract per matched page: all | first | last | N
tables_per_page: all
