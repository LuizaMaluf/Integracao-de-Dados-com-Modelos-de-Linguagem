source_name: ted_programas
type: xlsx
schedule: "@weekly"

file_path: /opt/airflow/raw_files/ted_programas.xlsx

# Sheet to read — name or 0-based index
sheet_name: Dados

# Columns to keep (leave empty to keep all)
columns:
  - nr_convenio
  - nm_programa
  - vl_repasse
  - dt_inicio
  - dt_fim

skip_rows: 1

# dbt package this source feeds — used by transformation_dag_factory to group DAGs
dbt_packages:
  - name: ted
    select: models/silver/

# Airflow Dataset URI produced after silver write — triggers transform_ted DAG
silver_dataset: "silver://ted_programas"
