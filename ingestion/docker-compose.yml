version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      httpx pdfplumber camelot-py[cv] unstructured[pdf]
      anthropic pandas openpyxl sqlalchemy
      fsspec s3fs boto3 duckdb PyYAML
      astronomer-cosmos dbt-postgres
    # MinIO connection
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET_BRONZE: ${MINIO_BUCKET_BRONZE:-bronze}
    # DuckDB
    DUCKDB_PATH: /opt/airflow/data/silver.duckdb
    # Anthropic (semantic PDF parser)
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./configs:/opt/airflow/configs
    - ./extractors:/opt/airflow/extractors
    - ./parsers:/opt/airflow/parsers
    - ./storage:/opt/airflow/storage
    - ./bridge:/opt/airflow/bridge
    - airflow-logs:/opt/airflow/logs
    - duckdb-data:/opt/airflow/data
    - ../integration/output:/opt/airflow/output
    - ../integration/src:/opt/airflow/agent_src
    # transformation/ montado separado — dbt é independente do Airflow
    - ../transformation:/opt/airflow/transformation
  depends_on:
    airflow-db:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  duckdb-data:
  airflow-logs:
