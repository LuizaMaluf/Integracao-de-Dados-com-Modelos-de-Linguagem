x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  _PIP_ADDITIONAL_REQUIREMENTS: >-
    httpx pandas pyarrow boto3 duckdb sqlalchemy psycopg2-binary PyYAML
  # Provider selection
  CLIENT_NAME: ${CLIENT_NAME:-poc}
  CLIENTS_DIR: /opt/airflow/clients
  # Object storage (raw zone — used by StorageProvider)
  STORAGE_ENDPOINT: minio:9000
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
  STORAGE_BUCKET_RAW: ${STORAGE_BUCKET_RAW:-raw}
  # Data warehouse (bronze/silver/gold — used by PostgreSQLProvider)
  DW_CONN: postgresql+psycopg2://${DW_USER:-postgres}:${DW_PASSWORD:-postgres}@data-db/${DW_DBNAME:-data_warehouse}

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    <<: *airflow-env
  volumes:
    - ./ingestion/dags:/opt/airflow/dags
    - ./ingestion/configs:/opt/airflow/configs
    - ./ingestion/extractors:/opt/airflow/extractors
    - ./ingestion/providers:/opt/airflow/providers
    - ./clients:/opt/airflow/clients
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-init:
      condition: service_completed_successfully
    airflow-db:
      condition: service_healthy
    data-db:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ── Airflow metadata database ────────────────────────────────────────────────
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── Data warehouse (bronze / silver / gold) ───────────────────────────────────
  data-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DW_USER:-postgres}
      POSTGRES_PASSWORD: ${DW_PASSWORD:-postgres}
      POSTGRES_DB: ${DW_DBNAME:-data_warehouse}
    ports:
      - "5433:5432"
    volumes:
      - data-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DW_USER:-postgres}"]
      interval: 10s
      retries: 5

  # ── MinIO (raw zone) ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # ── Airflow ──────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: version
    depends_on:
      airflow-db:
        condition: service_healthy
      data-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

volumes:
  airflow-db-data:
  data-db-data:
  minio-data:
  airflow-logs:
